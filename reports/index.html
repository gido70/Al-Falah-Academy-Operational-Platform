<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>مركز التقارير التنفيذية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--navy:#0c447c;--blue:#185fa5;--teal:#0f9d8a;--gold:#ba7517;--bg:#e8f0fa;--text:#0c2a4a;--muted:#5a7fa8;--border:#b8d4ea;--card:#ffffff;--shadow:0 14px 34px rgba(12,68,124,.14)}
*{box-sizing:border-box}body{margin:0;font-family:Cairo,Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f7fbff 0%,var(--bg) 100%);color:var(--text)}
.top{background:linear-gradient(135deg,var(--navy),var(--blue),var(--teal));color:#fff;box-shadow:0 8px 24px rgba(12,68,124,.22)}
.top-inner{max-width:1180px;margin:auto;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}.brand{font-weight:900;font-size:22px}.home{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.45);border-radius:999px;padding:9px 16px;font-weight:700;background:rgba(255,255,255,.12)}
.wrap{max-width:1180px;margin:auto;padding:28px 18px 44px}.hero{background:#fff;border:1px solid var(--border);border-radius:24px;padding:30px;text-align:center;box-shadow:var(--shadow);margin-bottom:24px}.hero h1{margin:0 0 8px;font-size:34px;color:var(--navy)}.hero p{margin:0;color:var(--muted);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.report-card{min-height:185px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:30px 20px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:var(--shadow);transition:.18s ease}.report-card:hover{transform:translateY(-4px);border-color:var(--teal);box-shadow:0 18px 42px rgba(12,68,124,.2)}.report-card .icon{font-size:54px;line-height:1}.report-card .title{font-size:24px;font-weight:900}.report-card:focus{outline:3px solid rgba(15,157,138,.28);outline-offset:3px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero h1{font-size:28px}}@media(max-width:560px){.top-inner{justify-content:center;text-align:center}.grid{grid-template-columns:1fr}.report-card{min-height:150px}.hero{padding:24px 16px}}
</style>
</head>
<body>
<header class="top"><div class="top-inner"><div class="brand">أكاديمية الفلاح | مركز التقارير التنفيذية</div><a class="home" href="../index.html">العودة إلى صفحة الأدمن الرئيسية</a></div></header>
<main class="wrap">
<section class="hero"><h1>مركز التقارير التنفيذية</h1><p>مساحة مستقلة للتقارير التنفيذية المكتوبة يدوياً، دون التأثير على التقارير التشغيلية الحالية.</p></section>
<section class="grid" aria-label="تصنيفات مركز التقارير التنفيذية">
<a class="report-card" href="#" data-category="schools"><span class="icon">🏫</span><span class="title">تقارير المدارس</span></a>
<a class="report-card" href="#" data-category="companies"><span class="icon">🏢</span><span class="title">تقارير الشركات</span></a>
<a class="report-card" href="#" data-category="systems"><span class="icon">💻</span><span class="title">تقارير الأنظمة</span></a>
<a class="report-card" href="#" data-category="collections"><span class="icon">📚</span><span class="title">تقارير المجموعات</span></a>
<a class="report-card" href="#" data-category="projects"><span class="icon">🚀</span><span class="title">تقارير المشاريع</span></a>
<a class="report-card" href="#" data-category="other"><span class="icon">📊</span><span class="title">تقارير أخرى</span></a>
</section>
</main>
<script>
document.querySelectorAll('.report-card').forEach(card=>{card.addEventListener('click',e=>{e.preventDefault();});});
</script>
</body>
</html>
